name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_name: ImageTool
            platform: windows
            ext: .exe
          - os: ubuntu-latest
            build_name: ImageTool
            platform: linux
            ext: ''
          - os: macos-latest
            build_name: ImageTool
            platform: macos
            ext: ''

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 从 tag 或 commit SHA 生成版本号
    - name: Determine version
      id: version
      shell: bash
      run: |
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
        else
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=" >> "$GITHUB_OUTPUT"
        fi

    # Linux 需要安装 Qt 运行所需的系统依赖
    - name: Install Linux system dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgl1 \
          libegl1 \
          libxkbcommon0 \
          libdbus-1-3 \
          libxcb-cursor0 \
          libxcb-icccm4 \
          libxcb-keysyms1 \
          libxcb-shape0

    # 安装 Python 依赖，跳过平台特定的包
    - name: Install dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pip install -r requirements.txt

    - name: Install dependencies (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        pip install $(grep -ivE 'pywin32-ctypes|pefile' requirements.txt | tr '\n' ' ')

    # 将 logo.jpeg 转换为各平台所需的图标格式
    - name: Convert icon (Windows)
      if: matrix.os == 'windows-latest'
      shell: python
      run: |
        from PIL import Image
        img = Image.open("logo.jpeg")
        img.save("logo.ico", format="ICO", sizes=[(256, 256), (128, 128), (64, 64), (48, 48), (32, 32), (16, 16)])

    - name: Convert icon (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        mkdir -p logo.iconset
        sips -z 1024 1024 logo.jpeg --out logo.iconset/icon_512x512@2x.png
        sips -z 512 512 logo.jpeg --out logo.iconset/icon_512x512.png
        sips -z 512 512 logo.jpeg --out logo.iconset/icon_256x256@2x.png
        sips -z 256 256 logo.jpeg --out logo.iconset/icon_256x256.png
        sips -z 256 256 logo.jpeg --out logo.iconset/icon_128x128@2x.png
        sips -z 128 128 logo.jpeg --out logo.iconset/icon_128x128.png
        sips -z 64 64 logo.jpeg --out logo.iconset/icon_32x32@2x.png
        sips -z 32 32 logo.jpeg --out logo.iconset/icon_32x32.png
        sips -z 32 32 logo.jpeg --out logo.iconset/icon_16x16@2x.png
        sips -z 16 16 logo.jpeg --out logo.iconset/icon_16x16.png
        iconutil -c icns logo.iconset

    - name: Build for Windows
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile --noconsole --name ${{ matrix.build_name }} --icon logo.ico main.py

    - name: Build for Linux
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller --onefile --name ${{ matrix.build_name }} main.py

    - name: Build for macOS
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --onefile --noconsole --name ${{ matrix.build_name }} --icon logo.icns main.py

    # 重命名产物，带上版本号和平台标识
    - name: Rename artifact
      shell: bash
      run: |
        ARTIFACT="${{ matrix.build_name }}_${{ matrix.platform }}${{ matrix.ext }}"
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv "dist/${{ matrix.build_name }}.exe" "dist/${ARTIFACT}"
        else
          mv "dist/${{ matrix.build_name }}" "dist/${ARTIFACT}"
        fi
        echo "artifact_name=${ARTIFACT}" >> "$GITHUB_ENV"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.artifact_name }}
        path: dist/${{ env.artifact_name }}

  # 当推送 tag 时自动创建 Release 并上传产物
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    # 整理产物并生成 SHA256 校验和
    - name: Prepare release assets
      run: |
        mkdir -p release
        find artifacts -type f -exec cp {} release/ \;
        cd release
        sha256sum * > SHA256SUMS.txt
        echo "--- SHA256 校验和 ---"
        cat SHA256SUMS.txt

    # 判断是否为预发布版本（如 v1.0.0-rc1, v1.0.0-beta.1）
    - name: Check pre-release
      id: prerelease
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        if [[ "$TAG" =~ -(alpha|beta|rc|dev) ]]; then
          echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
        else
          echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
        fi
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: ImageTool ${{ steps.prerelease.outputs.tag }}
        generate_release_notes: true
        prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
        body_path: ''
        append_body: true
        body: |
          ## 下载

          | 平台 | 文件 |
          |------|------|
          | Windows | `ImageTool_windows.exe` |
          | Linux | `ImageTool_linux` |
          | macOS | `ImageTool_macos` |

          > Linux/macOS 下载后需要添加执行权限: `chmod +x ImageTool_*`

          校验和文件 `SHA256SUMS.txt` 可用于验证下载完整性:
          ```
          sha256sum -c SHA256SUMS.txt
          ```
        files: release/*
